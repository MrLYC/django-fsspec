name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Unit tests (SQLite, fast, matrix)
  # ---------------------------------------------------------------
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.2"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "django~=${{ matrix.django-version }}.0"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=django_fsspec --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check migrations
        run: |
          DJANGO_SETTINGS_MODULE=demo.settings python -m django makemigrations --check --dry-run

  # ---------------------------------------------------------------
  # Stage 2: E2E + Benchmark (real databases, after unit tests pass)
  # ---------------------------------------------------------------
  e2e-sqlite:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: E2E tests
        run: DJANGO_FSSPEC_BENCH_DB=sqlite python benchmarks/e2e_test.py

      - name: Benchmark
        run: DJANGO_FSSPEC_BENCH_DB=sqlite python benchmarks/run.py --db sqlite --scale ci --seed 1 --json benchmarks/results-sqlite.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-sqlite
          path: benchmarks/results-sqlite.json

  e2e-mysql:
    needs: unit-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql-version: "8.0"
            django-version: "4.2"
          - mysql-version: "8.0"
            django-version: "5.2"
    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: fsspec_test
          MYSQL_DATABASE: fsspec_test
          MYSQL_USER: fsspec
          MYSQL_PASSWORD: fsspec_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pfsspec_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure MySQL charset
        run: |
          for i in 1 2 3 4 5; do
            mysql -h 127.0.0.1 -P 3306 -u root -pfsspec_test -e "
              ALTER DATABASE fsspec_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            " && break || sleep 3
          done

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mysqlclient
          pip install "django~=${{ matrix.django-version }}.0"

      - name: E2E tests
        env:
          DJANGO_FSSPEC_BENCH_DB: mysql
          MYSQL_PORT: "3306"
        run: python benchmarks/e2e_test.py

      - name: Benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: mysql
          MYSQL_PORT: "3306"
        run: python benchmarks/run.py --db mysql-django-${{ matrix.django-version }} --scale ci --seed 1 --json benchmarks/results-mysql-${{ matrix.mysql-version }}-django-${{ matrix.django-version }}.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-mysql-${{ matrix.mysql-version }}-django-${{ matrix.django-version }}
          path: benchmarks/results-mysql-${{ matrix.mysql-version }}-django-${{ matrix.django-version }}.json

  e2e-postgres:
    needs: unit-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pg-version: "16"
            django-version: "4.2"
          - pg-version: "16"
            django-version: "5.2"
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_DB: fsspec_test
          POSTGRES_USER: fsspec
          POSTGRES_PASSWORD: fsspec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fsspec -d fsspec_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install psycopg2-binary
          pip install "django~=${{ matrix.django-version }}.0"

      - name: E2E tests
        env:
          DJANGO_FSSPEC_BENCH_DB: postgres
          POSTGRES_PORT: "5432"
        run: python benchmarks/e2e_test.py

      - name: Benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: postgres
          POSTGRES_PORT: "5432"
        run: python benchmarks/run.py --db postgres-django-${{ matrix.django-version }} --scale ci --seed 1 --json benchmarks/results-postgres-${{ matrix.pg-version }}-django-${{ matrix.django-version }}.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-postgres-${{ matrix.pg-version }}-django-${{ matrix.django-version }}
          path: benchmarks/results-postgres-${{ matrix.pg-version }}-django-${{ matrix.django-version }}.json

  e2e-oracle:
    needs: unit-test
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: fsspec_test
          APP_USER: fsspec
          APP_USER_PASSWORD: fsspec_test
        ports:
          - 1521:1521
        options: >-
          --health-cmd="healthcheck.sh"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=60s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "oracledb<4"

      - name: E2E tests
        env:
          DJANGO_FSSPEC_BENCH_DB: oracle
        run: python benchmarks/e2e_test.py

      - name: Benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: oracle
        run: python benchmarks/run.py --db oracle --scale ci --seed 1 --json benchmarks/results-oracle.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-oracle
          path: benchmarks/results-oracle.json

  # ---------------------------------------------------------------
  # Stage 3: Collect baseline
  # ---------------------------------------------------------------
  baseline:
    needs: [e2e-sqlite, e2e-mysql, e2e-postgres, e2e-oracle]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          path: benchmarks/results/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate baseline report
        run: |
          python -c "
          import json, glob

          all_results = []
          for f in sorted(glob.glob('benchmarks/results/**/*.json', recursive=True)):
              with open(f) as fh:
                  all_results.extend(json.load(fh))

          ops = {}
          for r in all_results:
              op = r.get('op', '?')
              if op not in ops:
                  ops[op] = {}
              ops[op][r.get('db', '?')] = r

          print('## Performance Baseline')
          print()
          print('| Operation | Database | Avg (ms) | P95 (ms) | Ops/s |')
          print('|-----------|----------|----------|----------|-------|')
          for op, dbs in sorted(ops.items()):
              for db, r in sorted(dbs.items()):
                  if 'error' in r:
                      print(f'| {op} | {db} | ERROR | | |')
                  else:
                      print(f'| {op} | {db} | {r[\"avg_ms\"]:.2f} | {r[\"p95_ms\"]:.2f} | {r[\"ops_per_sec\"]:.0f} |')

          with open('benchmarks/baseline.json', 'w') as f:
              json.dump(all_results, f, indent=2, default=str)
          "

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: benchmarks/baseline.json
          retention-days: 90

  # ---------------------------------------------------------------
  # Stage 4: Publish to PyPI (tag push only)
  # ---------------------------------------------------------------
  publish:
    needs: [unit-test, lint, e2e-sqlite, e2e-mysql, e2e-postgres, e2e-oracle]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify tag matches version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          # Extract version from wheel filename: name-version-...
          version = whl.split('/')[-1].split('-')[1]
          print(version)
          ")
          echo "Tag: $TAG, Package version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: Tag v$TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
