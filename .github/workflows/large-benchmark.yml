name: Large Benchmark

on:
  workflow_dispatch:
    inputs:
      database:
        description: Database backend to benchmark
        type: choice
        default: postgres
        options:
          - sqlite
          - mysql
          - postgres
          - oracle
      scale:
        description: Benchmark scale
        type: choice
        default: large
        options:
          - small
          - medium
          - large
      seed:
        description: Deterministic dataset seed
        default: "1"
      scenario:
        description: Scenario name, or all
        default: all
      block_size_kb:
        description: Block size in KiB, or all
        type: choice
        default: "32"
        options:
          - all
          - "32"
          - "64"
          - "128"
          - "256"

jobs:
  large-benchmark-sqlite:
    if: inputs.database == 'sqlite'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: sqlite
          SCALE_INPUT: ${{ inputs.scale }}
          SEED_INPUT: ${{ inputs.seed }}
          SCENARIO_INPUT: ${{ inputs.scenario }}
          BLOCK_SIZE_KB_INPUT: ${{ inputs.block_size_kb }}
        run: |
          SCENARIO_ARGS=()
          if [ "$SCENARIO_INPUT" != "all" ]; then
            SCENARIO_ARGS=(--scenario "$SCENARIO_INPUT")
          fi
          if [ "$BLOCK_SIZE_KB_INPUT" = "all" ]; then
            BLOCK_SIZES_KB=(32 64 128 256)
          else
            BLOCK_SIZES_KB=("$BLOCK_SIZE_KB_INPUT")
          fi

          for BLOCK_SIZE_KB in "${BLOCK_SIZES_KB[@]}"; do
            BLOCK_SIZE_BYTES=$((BLOCK_SIZE_KB * 1024))
            uv run --no-sync python benchmarks/run.py \
              --db "sqlite-$SCALE_INPUT-bs${BLOCK_SIZE_KB}k" \
              --scale "$SCALE_INPUT" \
              --seed "$SEED_INPUT" \
              --block-size "$BLOCK_SIZE_BYTES" \
              --json "benchmarks/results-sqlite-$SCALE_INPUT-seed-$SEED_INPUT-block-${BLOCK_SIZE_KB}k.json" \
              "${SCENARIO_ARGS[@]}"
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: large-benchmark-sqlite-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-${{ inputs.block_size_kb }}
          path: benchmarks/results-sqlite-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-*.json
          retention-days: 30

  large-benchmark-mysql:
    if: inputs.database == 'mysql'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: fsspec_test
          MYSQL_DATABASE: fsspec_test
          MYSQL_USER: fsspec
          MYSQL_PASSWORD: fsspec_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pfsspec_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Configure MySQL charset
        run: |
          for i in 1 2 3 4 5; do
            mysql -h 127.0.0.1 -P 3306 -u root -pfsspec_test -e "
              ALTER DATABASE fsspec_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            " && break || sleep 3
          done

      - name: Install dependencies
        run: |
          uv sync --extra dev --frozen
          uv pip install --python .venv/bin/python mysqlclient

      - name: Run benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: mysql
          MYSQL_PORT: "3306"
          SCALE_INPUT: ${{ inputs.scale }}
          SEED_INPUT: ${{ inputs.seed }}
          SCENARIO_INPUT: ${{ inputs.scenario }}
          BLOCK_SIZE_KB_INPUT: ${{ inputs.block_size_kb }}
        run: |
          SCENARIO_ARGS=()
          if [ "$SCENARIO_INPUT" != "all" ]; then
            SCENARIO_ARGS=(--scenario "$SCENARIO_INPUT")
          fi
          if [ "$BLOCK_SIZE_KB_INPUT" = "all" ]; then
            BLOCK_SIZES_KB=(32 64 128 256)
          else
            BLOCK_SIZES_KB=("$BLOCK_SIZE_KB_INPUT")
          fi

          for BLOCK_SIZE_KB in "${BLOCK_SIZES_KB[@]}"; do
            BLOCK_SIZE_BYTES=$((BLOCK_SIZE_KB * 1024))
            uv run --no-sync python benchmarks/run.py \
              --db "mysql-$SCALE_INPUT-bs${BLOCK_SIZE_KB}k" \
              --scale "$SCALE_INPUT" \
              --seed "$SEED_INPUT" \
              --block-size "$BLOCK_SIZE_BYTES" \
              --json "benchmarks/results-mysql-$SCALE_INPUT-seed-$SEED_INPUT-block-${BLOCK_SIZE_KB}k.json" \
              "${SCENARIO_ARGS[@]}"
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: large-benchmark-mysql-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-${{ inputs.block_size_kb }}
          path: benchmarks/results-mysql-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-*.json
          retention-days: 30

  large-benchmark-postgres:
    if: inputs.database == 'postgres'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fsspec_test
          POSTGRES_USER: fsspec
          POSTGRES_PASSWORD: fsspec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fsspec -d fsspec_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev --frozen
          uv pip install --python .venv/bin/python psycopg2-binary

      - name: Run benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: postgres
          POSTGRES_PORT: "5432"
          SCALE_INPUT: ${{ inputs.scale }}
          SEED_INPUT: ${{ inputs.seed }}
          SCENARIO_INPUT: ${{ inputs.scenario }}
          BLOCK_SIZE_KB_INPUT: ${{ inputs.block_size_kb }}
        run: |
          SCENARIO_ARGS=()
          if [ "$SCENARIO_INPUT" != "all" ]; then
            SCENARIO_ARGS=(--scenario "$SCENARIO_INPUT")
          fi
          if [ "$BLOCK_SIZE_KB_INPUT" = "all" ]; then
            BLOCK_SIZES_KB=(32 64 128 256)
          else
            BLOCK_SIZES_KB=("$BLOCK_SIZE_KB_INPUT")
          fi

          for BLOCK_SIZE_KB in "${BLOCK_SIZES_KB[@]}"; do
            BLOCK_SIZE_BYTES=$((BLOCK_SIZE_KB * 1024))
            uv run --no-sync python benchmarks/run.py \
              --db "postgres-$SCALE_INPUT-bs${BLOCK_SIZE_KB}k" \
              --scale "$SCALE_INPUT" \
              --seed "$SEED_INPUT" \
              --block-size "$BLOCK_SIZE_BYTES" \
              --json "benchmarks/results-postgres-$SCALE_INPUT-seed-$SEED_INPUT-block-${BLOCK_SIZE_KB}k.json" \
              "${SCENARIO_ARGS[@]}"
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: large-benchmark-postgres-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-${{ inputs.block_size_kb }}
          path: benchmarks/results-postgres-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-*.json
          retention-days: 30

  large-benchmark-oracle:
    if: inputs.database == 'oracle'
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: fsspec_test
          APP_USER: fsspec
          APP_USER_PASSWORD: fsspec_test
        ports:
          - 1521:1521
        options: >-
          --health-cmd="healthcheck.sh"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=60s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev --frozen
          uv pip install --python .venv/bin/python "oracledb<4"

      - name: Run benchmark
        env:
          DJANGO_FSSPEC_BENCH_DB: oracle
          SCALE_INPUT: ${{ inputs.scale }}
          SEED_INPUT: ${{ inputs.seed }}
          SCENARIO_INPUT: ${{ inputs.scenario }}
          BLOCK_SIZE_KB_INPUT: ${{ inputs.block_size_kb }}
        run: |
          SCENARIO_ARGS=()
          if [ "$SCENARIO_INPUT" != "all" ]; then
            SCENARIO_ARGS=(--scenario "$SCENARIO_INPUT")
          fi
          if [ "$BLOCK_SIZE_KB_INPUT" = "all" ]; then
            BLOCK_SIZES_KB=(32 64 128 256)
          else
            BLOCK_SIZES_KB=("$BLOCK_SIZE_KB_INPUT")
          fi

          for BLOCK_SIZE_KB in "${BLOCK_SIZES_KB[@]}"; do
            BLOCK_SIZE_BYTES=$((BLOCK_SIZE_KB * 1024))
            uv run --no-sync python benchmarks/run.py \
              --db "oracle-$SCALE_INPUT-bs${BLOCK_SIZE_KB}k" \
              --scale "$SCALE_INPUT" \
              --seed "$SEED_INPUT" \
              --block-size "$BLOCK_SIZE_BYTES" \
              --json "benchmarks/results-oracle-$SCALE_INPUT-seed-$SEED_INPUT-block-${BLOCK_SIZE_KB}k.json" \
              "${SCENARIO_ARGS[@]}"
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: large-benchmark-oracle-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-${{ inputs.block_size_kb }}
          path: benchmarks/results-oracle-${{ inputs.scale }}-seed-${{ inputs.seed }}-block-*.json
          retention-days: 30
